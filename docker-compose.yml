services:
  postgres:
    image: postgres:16-alpine
    container_name: stn-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stn_crm
    ports:
      - "5432:5432"
    volumes:
      - stn_crm_postgres:/var/lib/postgresql/data

volumes:
  stn_crm_postgres:
