services:
  postgres:
    image: postgres:16-alpine
    container_name: stn-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stn_crm
    ports:
      - "5432:5432"
    volumes:
      - stn_crm_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stn-crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - stn_crm_redis:/data

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: stn-crm-evolution
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      SERVER_PORT: "8080"
      # Auth
      AUTHENTICATION_API_KEY: evo-secret-key-change-me
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Webhook global → NestJS no host
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3333/api/whatsapp/webhook?token=25857e95ed19a7906df42e9c39566f760b4a37fb5e38f130
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      # Database — usa o mesmo postgres, schema separado
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://postgres:postgres@postgres:5432/stn_crm?schema=evolution_api"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      # Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_PREFIX_KEY: evolution
      # Config
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: "30"
      LANGUAGE: pt-BR
      CONFIG_SESSION_PHONE_CLIENT: "STN CRM"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
    volumes:
      - evolution_data:/evolution/instances

volumes:
  stn_crm_postgres:
  stn_crm_redis:
  evolution_data:
